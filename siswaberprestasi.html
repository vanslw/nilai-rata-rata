<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Siswa Berprestasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #EDEDEC;
    --teal-400: #6B6B68;
    --teal-600: #2A2A28;
    --teal-800: #101010;
    --gray-100: #F0F0EE;
    --gray-200: #E0E0DC;
    --gray-400: #9C9C97;
    --gray-700: #4A4A47;
    --gray-900: #121212;
    --red-100: #FCEBEB;
    --red-500: #E24B4A;
    --red-700: #A32D2D;
    --amber-100: #FAEEDA;
    --amber-600: #BA7517;
    --bg: #F5F5F3;
    --card: #FFFFFF;
    --radius: 12px;
    --radius-sm: 6px;
    --font: 'Manrope', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--gray-900);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: var(--gray-900);
    color: #fff;
    padding: 2.5rem 2rem 2rem;
  }
  .header-inner { max-width: 860px; margin: 0 auto; }
  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal-400);
    margin-bottom: 10px;
  }
  header h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  header p {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    max-width: 480px;
  }

  /* THRESHOLD BAR */
  .threshold-bar {
    background: var(--gray-900);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 1rem 2rem;
  }
  .threshold-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .threshold-label { font-size: 13px; color: rgba(255,255,255,0.45); white-space: nowrap; }
  .threshold-inner input[type=range] {
    flex: 1;
    min-width: 120px;
    max-width: 240px;
    accent-color: var(--teal-400);
    height: 4px;
  }
  .threshold-val {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--teal-400);
    min-width: 36px;
  }

  /* MAIN */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .stat-card .s-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 6px;
  }
  .stat-card .s-val {
    font-size: 28px;
    font-weight: 700;
    color: var(--gray-900);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat-card.green .s-val { color: var(--teal-600); }
  .stat-card.muted .s-val { color: var(--gray-400); }

  /* GRID */
  .student-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }
  .student-card {
    background: var(--card);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 1.25rem;
    transition: border-color 0.15s;
    position: relative;
  }
  .student-card.prestasi {
    border-color: var(--teal-400);
    background: #FBFFFE;
  }
  .student-card .badge-star {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--teal-50);
    color: var(--teal-600);
    padding: 3px 7px;
    border-radius: 4px;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    background: var(--gray-100);
    color: var(--gray-700);
  }
  .student-card.prestasi .avatar {
    background: var(--teal-50);
    color: var(--teal-600);
  }
  .student-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--gray-900);
    text-transform: capitalize;
    margin-bottom: 10px;
  }
  .scores {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .score-pill {
    font-family: var(--mono);
    font-size: 12px;
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    background: var(--gray-100);
    color: var(--gray-700);
  }
  .avg-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    border-top: 1px solid var(--gray-200);
    padding-top: 10px;
    margin-top: 2px;
  }
  .avg-label { font-size: 11px; color: var(--gray-400); }
  .avg-val {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 500;
    color: var(--gray-400);
  }
  .avg-val.pass { color: var(--teal-600); }

  /* DELETE BTN */
  .btn-delete {
    position: absolute;
    bottom: 10px;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--gray-200);
    padding: 4px;
    line-height: 1;
    transition: color 0.12s;
  }
  .btn-delete:hover { color: var(--red-500); }

  /* FORM */
  .form-card {
    background: var(--card);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 1.5rem;
  }
  .form-card h2 {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-900);
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }
  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--gray-400);
  }
  .form-field input {
    font-family: var(--font);
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--gray-900);
    outline: none;
    transition: border-color 0.12s;
    width: 100%;
  }
  .form-field input:focus { border-color: var(--teal-400); }
  .field-nama { flex: 2; min-width: 130px; }
  .field-n { flex: 1; min-width: 76px; }
  .btn-add {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    background: var(--gray-900);
    color: #fff;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
    align-self: flex-end;
  }
  .btn-add:hover { background: var(--teal-600); }
  .err-msg {
    font-size: 12px;
    color: var(--red-500);
    margin-top: 8px;
    display: none;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--gray-400);
    font-size: 14px;
    grid-column: 1 / -1;
  }

  @media (max-width: 540px) {
    header, .threshold-bar { padding-left: 1rem; padding-right: 1rem; }
    main { padding: 1.25rem 1rem 3rem; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="eyebrow">Sistem Penilaian</p>
    <h1>Siswa Berprestasi</h1>
    <p>Kelola data nilai siswa dan lihat siapa yang melampaui ambang batas.</p>
  </div>
</header>

<div class="threshold-bar">
  <div class="threshold-inner">
    <span class="threshold-label">Ambang batas rata-rata</span>
    <input type="range" id="threshold" min="0" max="100" step="1" value="70" />
    <span class="threshold-val" id="thresholdVal">70</span>
  </div>
</div>

<main>
  <div class="stats">
    <div class="stat-card">
      <div class="s-label">Total Siswa</div>
      <div class="s-val" id="statTotal">0</div>
    </div>
    <div class="stat-card green">
      <div class="s-label">Berprestasi</div>
      <div class="s-val" id="statPrestasi">0</div>
    </div>
    <div class="stat-card muted">
      <div class="s-label">Belum Memenuhi</div>
      <div class="s-val" id="statBelum">0</div>
    </div>
  </div>

  <div class="student-grid" id="studentGrid"></div>

  <div class="form-card">
    <h2>Tambah siswa baru</h2>
    <div class="form-row">
      <div class="form-field field-nama">
        <label>Nama</label>
        <input type="text" id="inputNama" placeholder="mis. Budi" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 1</label>
        <input type="number" id="inputN1" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 2</label>
        <input type="number" id="inputN2" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 3</label>
        <input type="number" id="inputN3" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 4</label>
        <input type="number" id="inputN4" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 5</label>
        <input type="number" id="inputN5" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 6</label>
        <input type="number" id="inputN6" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 7</label>
        <input type="number" id="inputN7" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 8</label>
        <input type="number" id="inputN8" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 9</label>
        <input type="number" id="inputN9" placeholder="0–100" min="0" max="100" />
      </div>
      <div class="form-field field-n">
        <label>Nilai 10</label>
        <input type="number" id="inputN10" placeholder="0–100" min="0" max="100" />
      </div>
      <button class="btn-add" onclick="tambahSiswa()">+ Tambah</button>
    </div>
    <p class="err-msg" id="errMsg"></p>
  </div>
</main>

<script>
  let siswa = {};
  let threshold = 70;
  const JUMLAH_NILAI = 10;

  function rataRata(nilai) {
    return nilai.reduce((a, b) => a + b, 0) / nilai.length;
  }

  function inisial(nama) {
    return nama.slice(0, 2).toUpperCase();
  }

  function hapusSiswa(nama) {
    delete siswa[nama];
    render();
  }

  function render() {
    const names = Object.keys(siswa);
    const prestasi = names.filter(n => rataRata(siswa[n]) > threshold);

    document.getElementById('statTotal').textContent = names.length;
    document.getElementById('statPrestasi').textContent = prestasi.length;
    document.getElementById('statBelum').textContent = names.length - prestasi.length;

    const grid = document.getElementById('studentGrid');
    grid.innerHTML = '';

    if (names.length === 0) {
      grid.innerHTML = '<div class="empty">Belum ada data siswa. Tambahkan siswa di bawah.</div>';
      return;
    }

    names.forEach(nama => {
      const nilai = siswa[nama];
      const rata = rataRata(nilai);
      const lulus = rata > threshold;

      const card = document.createElement('div');
      card.className = 'student-card' + (lulus ? ' prestasi' : '');
      card.innerHTML = `
        ${lulus ? '<span class="badge-star">&#9733; Berprestasi</span>' : ''}
        <div class="avatar">${inisial(nama)}</div>
        <div class="student-name">${nama}</div>
        <div class="scores">
          ${nilai.map((v, i) => `<span class="score-pill">N${i + 1}: ${v}</span>`).join('')}
        </div>
        <div class="avg-row">
          <span class="avg-label">Rata-rata</span>
          <span class="avg-val ${lulus ? 'pass' : ''}">${rata.toFixed(1)}</span>
        </div>
        <button class="btn-delete" onclick="hapusSiswa('${nama}')" title="Hapus siswa">&#10005;</button>
      `;
      grid.appendChild(card);
    });
  }

  document.getElementById('threshold').addEventListener('input', function () {
    threshold = parseInt(this.value);
    document.getElementById('thresholdVal').textContent = threshold;
    render();
  });

  function tambahSiswa() {
    const nama = document.getElementById('inputNama').value.trim();
    const err = document.getElementById('errMsg');

    if (!nama) {
      err.textContent = 'Nama siswa tidak boleh kosong.';
      err.style.display = 'block';
      return;
    }

    const nilaiArr = [];
    for (let i = 1; i <= JUMLAH_NILAI; i++) {
      const v = parseFloat(document.getElementById('inputN' + i).value);
      if (isNaN(v) || v < 0 || v > 100) {
        err.textContent = `Nilai ${i} tidak valid. Masukkan angka antara 0 dan 100.`;
        err.style.display = 'block';
        return;
      }
      nilaiArr.push(v);
    }

    err.style.display = 'none';
    siswa[nama] = nilaiArr;
    document.getElementById('inputNama').value = '';
    for (let i = 1; i <= JUMLAH_NILAI; i++) {
      document.getElementById('inputN' + i).value = '';
    }
    render();
  }

  document.querySelectorAll('.form-field input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') tambahSiswa(); });
  });

  render();
</script>
</body>
</html>
